name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out content repo
        uses: actions/checkout@v4

      - name: Check out code repo with submodules
        uses: actions/checkout@v4
        with:
          repository: landermkerbey/amanuensiswake
          path: amanuensiswake
          submodules: recursive

      - name: Point content submodule at this commit
        run: |
          cd amanuensiswake
          git -C content fetch origin main
          git -C content checkout ${{ github.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: amanuensiswake/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: amanuensiswake

      - name: Build
        run: npm run build
        working-directory: amanuensiswake

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AMANUENSISWAKE_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            amanuensiswake/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/amanuensiswake/dist/